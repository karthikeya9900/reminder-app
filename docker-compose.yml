version: "3.9"

services:
  db:
    image: postgres:15
    container_name: reminder-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: reminder_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: reminder-backend
    restart: always
    ports:
      - "1000:1000"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: reminder_app
      DB_PORT: 5432
    depends_on:
      - db

volumes:
  pgdata:
